<div class="min-h-screen bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md mx-auto bg-white rounded-lg shadowoverflow-hidden md:max-w-2xl bg-white shadow sm:rounded-lg">
    <div class="px-4 py-5 sm:px-6 border-b border-gray-200 flex justify-between items-center">
      <h3 class="text-lg leading-6 font-medium text-gray-900">
        {{ isEdit ? 'Edit Order' : 'Create New Order' }}
      </h3>
      <button (click)="back()" class="text-sm text-indigo-600 hover:text-indigo-900">
        &larr; Back to Orders
      </button>
    </div>
    <div class="px-4 py-5 sm:p-6">
      <form (ngSubmit)="saveOrder()" class="space-y-6">
        <div>
          <label for="userId" class="block text-sm font-medium text-gray-700">User</label>
          <div class="mt-1">
            <select id="userId" name="userId" [(ngModel)]="order.userId" required
              class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md border">
              <option value="0">Select User</option>
              <option *ngFor="let user of users" [value]="user.id">{{ user.username }}</option>
            </select>
          </div>
        </div>

        <div>
          <label for="productIds" class="block text-sm font-medium text-gray-700">Products</label>
          <div class="mt-1">
            <select multiple id="productIds" name="productIds" [(ngModel)]="order.productIds" required
              class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md border h-32">
              <option *ngFor="let product of products()" [value]="product._id">{{ product.name }} ({{ product.price }})
              </option>
            </select>
            <p class="mt-2 text-sm text-gray-500">Hold Ctrl (Windows) or Command (Mac) to select multiple products.</p>
          </div>
        </div>

        <div class="flex justify-end">
          <button type="button" (click)="back()"
            class="bg-white py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 mr-3">
            Cancel
          </button>
          <button type="submit"
            class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
            Save
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

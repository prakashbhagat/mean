<nav class="bg-indigo-600 shadow-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
            <div class="flex items-center">
                <a [routerLink]="['/']" class="text-white text-xl font-bold cursor-pointer">My App</a>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-4">
                        <ng-container *ngIf="isAuthenticated$ | async">
                            <a [routerLink]="['/']" routerLinkActive="bg-indigo-700"
                                [routerLinkActiveOptions]="{exact: true}"
                                class="text-indigo-100 hover:bg-indigo-700 hover:text-white px-3 py-2 rounded-md text-sm font-medium">Dashboard</a>
                            <a [routerLink]="['/products']" routerLinkActive="bg-indigo-700"
                                class="text-indigo-100 hover:bg-indigo-700 hover:text-white px-3 py-2 rounded-md text-sm font-medium">Products</a>
                            <a [routerLink]="['/orders']" routerLinkActive="bg-indigo-700"
                                class="text-indigo-100 hover:bg-indigo-700 hover:text-white px-3 py-2 rounded-md text-sm font-medium">Orders</a>
                        </ng-container>
                    </div>
                </div>
            </div>
            <div class="hidden md:block">
                <div class="ml-4 flex items-center md:ml-6">
                    <ng-container *ngIf="(isAuthenticated$ | async); else guestLinks">
                        <button (click)="logout()"
                            class="bg-indigo-700 text-white px-3 py-2 rounded-md text-sm font-medium hover:bg-indigo-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-indigo-600 focus:ring-white">
                            Logout
                        </button>
                    </ng-container>
                    <ng-template #guestLinks>
                        <a [routerLink]="['/auth/login']"
                            class="text-indigo-100 hover:bg-indigo-700 hover:text-white px-3 py-2 rounded-md text-sm font-medium">Login</a>
                        <a [routerLink]="['/auth/register']"
                            class="bg-indigo-500 text-white hover:bg-indigo-400 px-3 py-2 rounded-md text-sm font-medium ml-2">Register</a>
                    </ng-template>
                </div>
            </div>
            
            <div class="-mr-2 flex md:hidden">
                <button type="button"
                    class="bg-indigo-600 inline-flex items-center justify-center p-2 rounded-md text-indigo-200 hover:text-white hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-indigo-600 focus:ring-white"
                    aria-controls="mobile-menu" aria-expanded="false">
                    <span class="sr-only">Open main menu</span>
                    
                    <svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

</nav>
